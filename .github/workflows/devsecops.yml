name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:

  # - 1. Secret Scanning 
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:latest \
            detect --source=/repo --no-banner
        

  # - 2. SAST — Semgrep 
  sast-semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep scan
        run: |
          docker run --rm -v "$PWD:/src" semgrep/semgrep \
            semgrep scan --config=auto --sarif --output=/src/semgrep.sarif || true
      - name: Upload Semgrep SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

  # - 3. SAST — CodeQL 
  sast-codeql:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python
      - uses: github/codeql-action/analyze@v3

  # - 4. SCA + ENFORCED GATE 
  sca:
    name: SCA (Trivy) + Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy fs scan -> SARIF
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-sca.sarif
          severity: CRITICAL,HIGH
      - name: Upload SCA SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-sca.sarif
      - name: Security Gate (ENFORCED)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'   # ENFORCED 

  # - 5. Container Scan + SBOM 
  container:
    name: Container Scan + SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t demo-app:ci .
      - name: Trivy image scan -> SARIF
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: demo-app:ci
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
      - name: Upload image SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
      - name: Generate SBOM (Syft -> CycloneDX)
        continue-on-error: true
        uses: anchore/sbom-action@v0
        with:
          image: demo-app:ci
          format: cyclonedx-json
          artifact-name: sbom.cyclonedx.json

  # - 6. DAST 
  dast:
    name: DAST (OWASP ZAP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build & run app
        run: |
          docker build -t demo-app:ci .
          docker run -d --name demo-app -p 8000:8000 demo-app:ci
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8000/health >/dev/null; then echo "app up"; break; fi
            sleep 3
          done
      - name: ZAP Baseline Scan (report-only)
        run: |
          docker run --network host -v "$PWD:/zap/wrk:rw" \
            -t ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://localhost:8000 -r zap-report.html || true
      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap-report.html
          if-no-files-found: ignore
      - name: Stop app
        if: always()
        run: docker rm -f demo-app || true

  # - 7. Deploy 
  deploy:
    name: Deploy (gated)
    runs-on: ubuntu-latest
    needs: [secret-scan, sast-semgrep, sca, container, dast]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy step
        run: echo "All security gates passed -> deployment starts."
