name: DevSecOps Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:   # ხელით გაშვების ღილაკი Actions ტაბში

permissions:
  contents: read
  security-events: write   # საჭიროა SARIF-ის Security tab-ში ასატვირთად

jobs:

  # ── 1. Secret Scanning (gitleaks) ──────────────────────────────
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. SAST — Semgrep ──────────────────────────────────────────
  sast-semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep scan
        run: |
          docker run --rm -v "$PWD:/src" semgrep/semgrep \
            semgrep scan --config=auto --sarif --output=/src/semgrep.sarif || true
      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

  # ── 3. SAST — CodeQL (GitHub მშობლიური) ────────────────────────
  sast-codeql:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - uses: github/codeql-action/analyze@v3

  # ── 4. SCA — Trivy (დამოკიდებულებები) ──────────────────────────
  sca:
    name: SCA (Trivy fs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy fs scan → SARIF (Security tab)
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-sca.sarif
          severity: CRITICAL,HIGH
      - name: Upload SCA SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-sca.sarif
      - name: 🚦 Security Gate — fail on CRITICAL/HIGH
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'      # ← ეს აჩერებს pipeline-ს (კარიბჭე)

  # ── 5. Container Build + Scan + SBOM ───────────────────────────
  container:
    name: Container Scan + SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t nodegoat:ci .
      - name: Trivy image scan → SARIF
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: nodegoat:ci
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
      - name: Upload image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
      - name: Generate SBOM (Syft → CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          image: nodegoat:ci
          format: cyclonedx-json
          artifact-name: sbom.cyclonedx.json

  # ── 6. DAST — OWASP ZAP ────────────────────────────────────────
  dast:
    name: DAST (OWASP ZAP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start app (app + mongo)
        run: |
          docker compose up -d
          echo "ველოდები აპლიკაციის გაშვებას..."
          for i in $(seq 1 40); do
            if curl -sf http://localhost:4000 >/dev/null; then echo "✅ აპი მზადაა"; break; fi
            sleep 5
          done
      - name: ZAP Baseline Scan
        run: |
          docker run --network host -v "$PWD:/zap/wrk:rw" \
            -t ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://localhost:4000 -r zap-report.html || true
      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap-report.html
      - name: Stop app
        if: always()
        run: docker compose down

  # ── 7. Deploy — მხოლოდ თუ ყველა შემოწმება გავიდა ───────────────
  deploy:
    name: Deploy (gated)
    runs-on: ubuntu-latest
    needs: [secret-scan, sast-semgrep, sca, container, dast]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Deploy step
        run: echo "✅ ყველა უსაფრთხოების კარიბჭე გავიდა — deployment იწყება"
